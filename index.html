<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111316">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reminders">
<title>Reminders</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111316;--surface:#1a1c1f;--surface2:#252729;--surface3:#333538;--primary:#ffd79b;--primary2:#ffb300;--text:#e2e2e6;--text2:#d6c4ac;--text3:#8a7f72;--danger:#ff7043;--radius:1.5rem;--radius-sm:0.75rem;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Manrope',sans-serif;color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--primary);}
.greeting{font-size:15px;font-weight:600;}
.bell-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:18px;}

.hero{padding:24px 20px 16px;}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;}
.hero h1{font-size:32px;font-weight:800;line-height:1.1;letter-spacing:-0.02em;}
.hero p{font-size:12px;color:var(--text3);margin-top:5px;}
.active-badge{background:var(--surface2);border-radius:2rem;padding:10px 14px;display:flex;flex-direction:column;align-items:center;min-width:72px;}
.active-badge .num{font-size:24px;font-weight:800;color:var(--primary);line-height:1;}
.active-badge .lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.12em;margin-top:2px;}

.tabs{display:flex;padding:0 14px;gap:3px;margin-bottom:4px;}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--text3);font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.07em;cursor:pointer;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.2s;}
.tab svg{width:16px;height:16px;stroke:currentColor;fill:none;}
.tab.active{background:var(--primary2);color:#432c00;}

.cards{padding:6px 14px;display:flex;flex-direction:column;gap:11px;}
.card{background:var(--surface);border-radius:var(--radius);padding:16px 16px 13px;position:relative;transition:opacity 0.35s;overflow:hidden;}
.card.high::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;background:var(--danger);border-radius:0 2px 2px 0;}
.card.done{opacity:0.42;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.priority-tag{font-size:9px;font-weight:700;letter-spacing:0.1em;display:flex;align-items:center;gap:3px;}
.priority-tag.high{color:var(--danger);}
.priority-tag.medium{color:var(--primary2);}
.priority-tag.low{color:var(--text3);}
.checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--surface3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;}
.checkbox.checked{background:var(--primary2);border-color:var(--primary2);}
.checkbox.checked::after{content:'✓';font-size:12px;color:#432c00;font-weight:700;}
.card-title{font-size:16px;font-weight:700;margin:7px 0 11px;line-height:1.3;}
.card.done .card-title{text-decoration:line-through;color:var(--text3);}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.meta-chip{background:var(--surface2);border-radius:2rem;padding:5px 9px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:3px;}
.meta-chip.overdue{color:var(--danger);}
.meta-chip.upcoming{color:var(--primary2);}
.meta-chip.category{color:var(--text2);}
.meta-chip.freq{color:var(--primary);background:rgba(255,215,155,0.08);}
.delete-btn{position:absolute;top:12px;right:44px;width:26px;height:26px;border-radius:50%;background:rgba(255,112,67,0.12);border:none;cursor:pointer;color:var(--danger);font-size:13px;display:none;align-items:center;justify-content:center;}
.card:hover .delete-btn,.card:active .delete-btn{display:flex;}

.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:42px;margin-bottom:14px;opacity:0.35;}
.empty h3{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.empty p{font-size:13px;}

.fab{position:fixed;bottom:84px;right:max(16px, calc(50% - 199px));width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;cursor:pointer;font-size:26px;color:#432c00;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(255,179,0,0.28);transition:transform 0.2s;z-index:100;}
.fab:active{transform:scale(0.93);}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(17,19,22,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;padding:7px 10px 22px;gap:2px;z-index:100;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:rgba(26,28,31,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:1.5rem 1.5rem 0 0;z-index:201;padding:18px 18px 40px;transition:transform 0.4s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto;}
.sheet.open{transform:translateX(-50%) translateY(0);}
.sheet-handle{width:38px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-size:22px;font-weight:800;margin-bottom:20px;}
.sheet-close{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:var(--surface3);border:none;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;}
.field-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--text3);margin-bottom:7px;}
.field-group{margin-bottom:16px;}
.field-input{width:100%;background:var(--surface2);border:none;border-radius:var(--radius-sm);padding:13px 15px;font-family:'Manrope',sans-serif;font-size:15px;color:var(--text);outline:none;transition:background 0.2s;}
.field-input:focus{background:var(--surface3);}
.field-input::placeholder{color:var(--text3);}
.date-time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg-toggle{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:2px;}
.seg-btn{flex:1;padding:9px 4px;border:none;background:transparent;font-family:'Manrope',sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:0.55rem;transition:all 0.2s;}
.seg-btn.active{background:var(--surface3);color:var(--text);}
.freq-toggle{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:2px;}
.freq-btn{flex:1;padding:9px 2px;border:none;background:transparent;font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-radius:0.55rem;transition:all 0.2s;text-align:center;}
.freq-btn.active{background:rgba(255,215,155,0.15);color:var(--primary);}
.sheet-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:14px;border-radius:2rem;background:var(--surface3);border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--text2);cursor:pointer;}
.btn-save{flex:2;padding:14px;border-radius:2rem;background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:#432c00;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}

.notif-bar{background:var(--surface2);border-radius:var(--radius-sm);padding:11px 15px;margin:0 14px 10px;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.notif-bar button{background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;border-radius:1rem;padding:6px 13px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;color:#432c00;cursor:pointer;}

.card-enter{animation:cardIn 0.3s cubic-bezier(.4,0,.2,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="scroll-area">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="avatar">FK</div>
      <span class="greeting" id="greeting">Good morning, Faker</span>
    </div>
    <button class="bell-btn" onclick="requestNotifPerm()">🔔</button>
  </div>
  <div id="notif-prompt"></div>
  <div class="hero">
    <div class="hero-row">
      <div><h1>Your Reminders</h1><p>Stay ahead of the curve.</p></div>
      <div class="active-badge"><span class="num" id="active-count">0</span><span class="lbl">ACTIVE</span></div>
    </div>
  </div>
  <div class="tabs" id="top-tabs">
    <button class="tab active" data-tab="all" onclick="switchTab('all')">
      <svg viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1.5" stroke-width="1.5"/></svg>ALL
    </button>
    <button class="tab" data-tab="today" onclick="switchTab('today')">
      <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke-width="1.5" stroke-linecap="round"/></svg>TODAY
    </button>
    <button class="tab" data-tab="upcoming" onclick="switchTab('upcoming')">
      <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14M7 13h6" stroke-width="1.5" stroke-linecap="round"/></svg>UPCOMING
    </button>
    <button class="tab" data-tab="completed" onclick="switchTab('completed')">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" stroke-width="1.5"/><path d="M7 10l2 2 4-4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>DONE
    </button>
  </div>
  <div class="cards" id="cards-container"></div>
</div>

<button class="fab" onclick="openSheet()">+</button>
<nav class="bottom-nav">
  <button class="tab active" data-tab="all" onclick="switchTab('all')">
    <svg viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1.5" stroke-width="1.5"/></svg>ALL
  </button>
  <button class="tab" data-tab="today" onclick="switchTab('today')">
    <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke-width="1.5" stroke-linecap="round"/></svg>TODAY
  </button>
  <button class="tab" data-tab="upcoming" onclick="switchTab('upcoming')">
    <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14M7 13h6" stroke-width="1.5" stroke-linecap="round"/></svg>UPCOMING
  </button>
  <button class="tab" data-tab="completed" onclick="switchTab('completed')">
    <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" stroke-width="1.5"/><path d="M7 10l2 2 4-4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>DONE
  </button>
</nav>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()">✕</button>
  <div class="sheet-title">New Reminder</div>
  <div class="field-group">
    <div class="field-label">TITLE</div>
    <input class="field-input" id="f-title" type="text" placeholder="What needs attention?">
  </div>
  <div class="date-time-row">
    <div class="field-group"><div class="field-label">DATE</div><input class="field-input" id="f-date" type="date"></div>
    <div class="field-group"><div class="field-label">TIME</div><input class="field-input" id="f-time" type="time"></div>
  </div>
  <div class="field-group">
    <div class="field-label">FREQUENCY</div>
    <div class="freq-toggle">
      <button class="freq-btn active" data-f="once" onclick="setFreq('once')">Once</button>
      <button class="freq-btn" data-f="daily" onclick="setFreq('daily')">Daily</button>
      <button class="freq-btn" data-f="weekly" onclick="setFreq('weekly')">Weekly</button>
      <button class="freq-btn" data-f="monthly" onclick="setFreq('monthly')">Monthly</button>
      <button class="freq-btn" data-f="yearly" onclick="setFreq('yearly')">Yearly</button>
    </div>
  </div>
  <div class="field-group">
    <div class="field-label">PRIORITY</div>
    <div class="seg-toggle">
      <button class="seg-btn" data-p="low" onclick="setPrio('low')">Low</button>
      <button class="seg-btn active" data-p="medium" onclick="setPrio('medium')">Medium</button>
      <button class="seg-btn" data-p="high" onclick="setPrio('high')">High</button>
    </div>
  </div>
  <div class="field-group">
    <div class="field-label">NOTES (OPTIONAL)</div>
    <textarea class="field-input" id="f-notes" rows="3" placeholder="Add context or details..." style="resize:none;"></textarea>
  </div>
  <div class="field-group">
    <div class="field-label">LIST</div>
    <input class="field-input" id="f-list" type="text" value="Inbox">
  </div>
  <div class="sheet-actions">
    <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
    <button class="btn-save" onclick="saveReminder()">✓ Save Reminder</button>
  </div>
</div>

<script>
let reminders=[],currentTab='all',currentPrio='medium',currentFreq='once';
function load(){try{reminders=JSON.parse(localStorage.getItem('rem_v2')||'[]');}catch(e){reminders=[];}}
function save(){localStorage.setItem('rem_v2',JSON.stringify(reminders));}
function setGreeting(){const h=new Date().getHours();const g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';document.getElementById('greeting').textContent=g+', Faker';}
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));render();}
function setPrio(p){currentPrio=p;document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));}
function setFreq(f){currentFreq=f;document.querySelectorAll('.freq-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));}
function openSheet(){document.getElementById('sheet').classList.add('open');document.getElementById('overlay').classList.add('open');document.getElementById('f-date').value=new Date().toISOString().split('T')[0];setTimeout(()=>document.getElementById('f-title').focus(),350);}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('overlay').classList.remove('open');document.getElementById('f-title').value='';document.getElementById('f-time').value='';document.getElementById('f-notes').value='';document.getElementById('f-list').value='Inbox';setPrio('medium');setFreq('once');}
function saveReminder(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').style.outline='2px solid var(--danger)';setTimeout(()=>document.getElementById('f-title').style.outline='',800);return;}
  const r={id:Date.now(),title,date:document.getElementById('f-date').value,time:document.getElementById('f-time').value,priority:currentPrio,freq:currentFreq,notes:document.getElementById('f-notes').value.trim(),list:document.getElementById('f-list').value.trim()||'Inbox',done:false};
  reminders.unshift(r);save();closeSheet();render();scheduleNotification(r);
}
function toggleDone(id){const r=reminders.find(x=>x.id===id);if(r){r.done=!r.done;save();render();}}
function deleteReminder(id){if(confirm('Delete this reminder?')){reminders=reminders.filter(x=>x.id!==id);save();render();}}
function getStatus(r){if(!r.date)return'no-date';const now=new Date();const rd=new Date(r.date+(r.time?'T'+r.time:'T23:59'));const today=new Date();today.setHours(0,0,0,0);const rday=new Date(r.date);rday.setHours(0,0,0,0);if(rd<now&&!r.done)return'overdue';if(rday.getTime()===today.getTime())return'today';if(rd>now)return'upcoming';return'past';}
function formatDate(r){if(!r.date)return'';const now=new Date();const rd=new Date(r.date+(r.time?'T'+r.time:'T23:59'));const today=new Date();today.setHours(0,0,0,0);const rday=new Date(r.date);rday.setHours(0,0,0,0);const diff=Math.round((now-rd)/3600000);if(getStatus(r)==='overdue')return'Overdue ('+diff+'h ago)';if(rday.getTime()===today.getTime())return r.time?'Today, '+fmtTime(r.time):'Today';const tom=new Date(today);tom.setDate(today.getDate()+1);if(rday.getTime()===tom.getTime())return r.time?'Tomorrow, '+fmtTime(r.time):'Tomorrow';return rday.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'})+(r.time?', '+fmtTime(r.time):'');}
function fmtTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return((h%12)||12)+':'+String(m).padStart(2,'0')+(h>=12?' PM':' AM');}
const freqLabel={once:'',daily:'Daily',weekly:'Weekly',monthly:'Monthly',yearly:'Yearly'};
function filterReminders(){const today=new Date();today.setHours(0,0,0,0);if(currentTab==='completed')return reminders.filter(r=>r.done);const active=reminders.filter(r=>!r.done);if(currentTab==='today')return active.filter(r=>{if(!r.date)return false;const rday=new Date(r.date);rday.setHours(0,0,0,0);return rday.getTime()===today.getTime();});if(currentTab==='upcoming')return active.filter(r=>{if(!r.date)return false;const rd=new Date(r.date+(r.time?'T'+r.time:'T23:59'));return rd>new Date();});return active;}
function render(){
  const list=filterReminders();
  document.getElementById('active-count').textContent=reminders.filter(r=>!r.done).length;
  const c=document.getElementById('cards-container');
  if(!list.length){const msgs={all:'No active reminders',today:'Nothing due today',upcoming:'Nothing coming up',completed:'No completed reminders yet'};const icons={all:'🔔',today:'☀️',upcoming:'📅',completed:'✅'};c.innerHTML=`<div class="empty"><div class="empty-icon">${icons[currentTab]}</div><h3>${msgs[currentTab]}</h3><p>${currentTab==='completed'?'Mark reminders done to see them here':'Tap + to add one'}</p></div>`;return;}
  const sorted=[...list].sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return new Date(a.date+(a.time?'T'+a.time:''))-new Date(b.date+(b.time?'T'+b.time:''));});
  const pi={high:'⚠',medium:'●',low:'○'};const pl={high:'HIGH PRIORITY',medium:'MEDIUM',low:'LOW'};
  c.innerHTML=sorted.map(r=>{const st=getStatus(r);const ds=formatDate(r);const dc=st==='overdue'?'overdue':st==='today'||st==='upcoming'?'upcoming':'category';const hf=r.freq&&r.freq!=='once';return`<div class="card ${r.priority}${r.done?' done':''} card-enter"><button class="delete-btn" onclick="deleteReminder(${r.id})">✕</button><div class="card-top"><span class="priority-tag ${r.priority}">${pi[r.priority]} ${pl[r.priority]}</span><div class="checkbox${r.done?' checked':''}" onclick="toggleDone(${r.id})"></div></div><div class="card-title">${r.title}</div><div class="card-meta">${ds?`<span class="meta-chip ${dc}">🕐 ${ds}</span>`:''} ${hf?`<span class="meta-chip freq">↻ ${freqLabel[r.freq]}</span>`:''}<span class="meta-chip category">📁 ${r.list}</span></div></div>`;}).join('');
}
function scheduleNotification(r){if(!r.date||!r.time)return;if(!('Notification'in window))return;if(Notification.permission==='granted'){const rd=new Date(r.date+'T'+r.time);const delay=rd-Date.now();if(delay>0&&delay<86400000)setTimeout(()=>new Notification('🔔 '+r.title,{body:r.notes||'Tap to open',icon:'/icon-192.png'}),delay);}}
function requestNotifPerm(){if('Notification'in window)Notification.requestPermission().then(p=>{if(p==='granted')document.getElementById('notif-prompt').innerHTML='';render();});}
function checkNotifPrompt(){if('Notification'in window&&Notification.permission==='default'){document.getElementById('notif-prompt').innerHTML='<div class="notif-bar"><span>Enable notifications for reminders</span><button onclick="requestNotifPerm()">Enable</button></div>';}}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');
load();setGreeting();render();checkNotifPrompt();setInterval(render,60000);
</script>
</body>
</html>
